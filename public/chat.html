<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — Birke</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070f;
      --surface: #0f0f1a;
      --surface2: #16162a;
      --surface3: #1c1c2e;
      --primary: #7c3aed;
      --primary-light: #9f67ff;
      --accent: #6366f1;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: #2a2a40;
      --error: #f87171;
      --success: #4ade80;
      --msg-user-bg: rgba(124, 58, 237, 0.2);
      --msg-ai-bg: var(--surface2);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(7, 7, 15, 0.9);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
      gap: 1rem;
      z-index: 10;
    }

    .header-logo {
      font-size: 1.3rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .header-actions { display: flex; align-items: center; gap: 0.5rem; }

    .btn-ghost {
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-ghost:hover { color: var(--text); border-color: rgba(124,58,237,0.5); }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── CHAT COLUMN ── */
    .chat-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid var(--border);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .msg {
      display: flex;
      gap: 0.75rem;
      max-width: 82%;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { margin-left: auto; flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg-avatar.ai {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      font-weight: 700;
      color: #fff;
      font-size: 0.75rem;
    }

    .msg-avatar.user { background: var(--surface2); border: 1px solid var(--border); }

    .msg-bubble {
      padding: 0.85rem 1.1rem;
      border-radius: 14px;
      font-size: 0.93rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .msg.ai .msg-bubble {
      background: var(--msg-ai-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg.user .msg-bubble {
      background: var(--msg-user-bg);
      border: 1px solid rgba(124,58,237,0.3);
      border-bottom-right-radius: 4px;
      color: #ddd6fe;
    }

    .msg-typing .msg-bubble { padding: 1rem 1.25rem; }

    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingDot 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingDot {
      0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
      30% { transform: scale(1.3); opacity: 1; }
    }

    /* ── INPUT AREA ── */
    .input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #msgInput {
      flex: 1;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.93rem;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 140px;
      min-height: 46px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    #msgInput:focus { border-color: var(--primary); }
    #msgInput::placeholder { color: var(--text-muted); opacity: 0.6; }

    .send-btn {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 3px 10px rgba(124,58,237,0.35);
    }

    .send-btn:hover { transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 320px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      background: var(--surface);
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .sidebar-section {
      border-bottom: 1px solid var(--border);
      padding: 1.1rem 1.25rem;
    }

    .sidebar-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* Traits */
    .trait-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .trait-row { display: flex; flex-direction: column; gap: 0.25rem; }

    .trait-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .trait-name { text-transform: capitalize; font-weight: 600; }
    .trait-val { font-weight: 700; color: var(--primary-light); }

    .trait-bar {
      height: 5px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .trait-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    /* Memories */
    .memory-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .memory-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.75rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.4;
      position: relative;
      padding-left: 1rem;
    }

    .memory-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--primary);
      border-radius: 99px 0 0 99px;
    }

    .no-data {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Mobile: hide sidebar, show toggle */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .sidebar.show { display: flex; position: fixed; right: 0; top: 56px; bottom: 0; z-index: 50; box-shadow: -4px 0 20px rgba(0,0,0,0.4); }
      .sidebar-toggle { display: flex !important; }
    }

    .sidebar-toggle {
      display: none;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sidebar-toggle:hover { color: var(--text); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-logo">Birke</div>

    <div class="header-actions">
      <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰ Info</button>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">

    <!-- CHAT -->
    <div class="chat-col">
      <div class="messages" id="messages">
        <!-- Messages injected here -->
      </div>

      <div class="input-area">
        <textarea id="msgInput" rows="1" placeholder="Message Birke…"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M2 9l14-7-5 7 5 7L2 9z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">

      <!-- Personality Traits -->
      <div class="sidebar-section">
        <div class="sidebar-title">✨ Personality Traits</div>
        <div class="trait-list" id="traitList">
          <div class="no-data">Loading traits…</div>
        </div>
      </div>

      <!-- Memories -->
      <div class="sidebar-section">
        <div class="sidebar-title">🧠 Memories (<span id="memCount">0</span>)</div>
        <div class="memory-list" id="memoryList">
          <div class="no-data">No memories yet — start chatting!</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    function getSessionId() {
      let id = localStorage.getItem('birke_session');
      if (!id || !/^[a-f0-9]{32}$/.test(id)) {
        if (window.crypto && window.crypto.getRandomValues) {
          id = Array.from(crypto.getRandomValues(new Uint8Array(16)))
            .map(b => b.toString(16).padStart(2, '0')).join('');
        } else {
          id = Array.from({ length: 32 }, () => Math.floor(Math.random() * 16).toString(16)).join('');
        }
        localStorage.setItem('birke_session', id);
      }
      return id;
    }
    const sessionId = getSessionId();

    let isWaiting = false;

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Auto-resize textarea
    const input = document.getElementById('msgInput');
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 140) + 'px';
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function appendMsg(role, text) {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const avatarText = role === 'ai' ? 'B' : '👤';
      div.innerHTML = `
        <div class="msg-avatar ${role}">${avatarText}</div>
        <div class="msg-bubble">${escHtml(text).replace(/\n/g,'<br>')}</div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }

    function showTyping() {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ai msg-typing';
      div.id = 'typingIndicator';
      div.innerHTML = `
        <div class="msg-avatar ai">B</div>
        <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isWaiting) return;

      isWaiting = true;
      document.getElementById('sendBtn').disabled = true;
      input.value = '';
      input.style.height = '';

      appendMsg('user', text);
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Session-Id': sessionId
          },
          body: JSON.stringify({ message: text })
        });

        hideTyping();

        const data = await res.json();
        if (!res.ok) {
          appendMsg('ai', `⚠ ${data.error || 'Something went wrong.'}`);
        } else {
          appendMsg('ai', data.reply);
          updateSidebar(data.memories, data.traits);
        }
      } catch (err) {
        hideTyping();
        appendMsg('ai', '⚠ Connection error. Please try again.');
      } finally {
        isWaiting = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }

    function updateTraits(traits) {
      const container = document.getElementById('traitList');
      const maxVal = Math.max(...Object.values(traits), 10);
      const entries = Object.entries(traits);
      if (!entries.length) {
        container.innerHTML = '<div class="no-data">Traits forming…</div>';
        return;
      }
      container.innerHTML = entries.map(([name, val]) => `
        <div class="trait-row">
          <div class="trait-header">
            <span class="trait-name">${escHtml(name)}</span>
            <span class="trait-val">${val}</span>
          </div>
          <div class="trait-bar">
            <div class="trait-fill" style="width:${Math.min(100, Math.round(val / maxVal * 100))}%"></div>
          </div>
        </div>`).join('');
    }

    function updateMemories(memories) {
      const container = document.getElementById('memoryList');
      document.getElementById('memCount').textContent = memories.length;
      if (!memories.length) {
        container.innerHTML = '<div class="no-data">No memories yet — start chatting!</div>';
        return;
      }
      const recent = memories.slice(-10).reverse();
      container.innerHTML = recent.map(m => `
        <div class="memory-item">${escHtml(m)}</div>`).join('');
    }

    function updateSidebar(memories, traits) {
      updateTraits(traits);
      updateMemories(memories);
    }

    async function loadInitialState() {
      try {
        const res = await fetch('/api/state', {
          headers: { 'X-Session-Id': sessionId }
        });
        if (!res.ok) {
          document.getElementById('traitList').innerHTML = '<div class="no-data">Could not load state.</div>';
          return;
        }
        const data = await res.json();
        updateSidebar(data.memories || [], data.traits || {});
      } catch (e) {
        document.getElementById('traitList').innerHTML = '<div class="no-data">Could not load state.</div>';
      }
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('show');
    }

    // Welcome message
    appendMsg('ai', `Hey! I'm Birke — your personal AI. I remember everything you share with me and grow with you over time. What's on your mind? 😊`);

    // Load data
    loadInitialState();
  </script>
</body>
</html>
